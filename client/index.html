<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="VenueFlow — Real-time crowd intelligence for Wankhede Stadium. Live zone status, wait times, congestion-aware navigation, and AI-powered venue assistance." />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>VenueFlow — Live Crowd Intelligence | Wankhede Stadium</title>

    <!-- Google Fonts: Inter for modern, clean typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- PWA icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Google Maps JS API — key injected at build time via Vite plugin -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key=__VITE_GOOGLE_MAPS_API_KEY__&libraries=geometry,marker"
      async
      defer
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p>VenueFlow requires JavaScript to display live crowd data. Please enable JavaScript and reload.</p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
