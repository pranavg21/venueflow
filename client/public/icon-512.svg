      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <text x="256" y="340" text-anchor="middle" fill="white" font-size="260" font-family="Arial, Helvetica, sans-serif" font-weight="bold">V</text>
